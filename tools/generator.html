<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFYT & BBN - Generador Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(138,43,226,0.15), rgba(0,242,255,0.15));
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #8a2be2, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle { color: #888; font-size: 1.1rem; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        
        .card {
            background: rgba(22,22,30,0.95);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .card h2 {
            color: #00f2ff;
            margin-bottom: 25px;
            font-size: 1.3rem;
            border-bottom: 2px solid rgba(138,43,226,0.3);
            padding-bottom: 12px;
        }
        
        .form-group { margin-bottom: 22px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: #0f0f15;
            border: 2px solid #2a2a35;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8a2be2;
            box-shadow: 0 0 15px rgba(138,43,226,0.3);
        }
        textarea { min-height: 80px; resize: vertical; }
        
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #8a2be2, #00f2ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(138,43,226,0.5);
        }
        
        .output-section {
            margin-bottom: 28px;
            position: relative;
            background: #0f0f15;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #8a2be2;
        }
        .output-section h3 {
            color: #8a2be2;
            margin-bottom: 12px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .output-box {
            background: #0a0a0f;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a35;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 60px;
            color: #ccc;
            max-height: 300px;
            overflow-y: auto;
        }
        .copy-btn {
            position: absolute;
            top: 22px;
            right: 22px;
            background: #2a2a35;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #00f2ff;
            color: #0a0a0f;
            transform: scale(1.05);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(90deg, #8a2be2, #00f2ff);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1> COMMAND CENTER</h1>
            <p class="subtitle">Beats BFYT & Boom Baap Nations | Generador Pro de Metadatos</p>
        </header>

        <div class="dashboard">
            <!-- PANEL DE CONTROL -->
            <div class="card">
                <h2>⚙️ Configurar Beat</h2>
                
                <div class="form-group">
                    <label>Canal</label>
                    <select id="canal">
                        <option value="BFYT">Beats BFYT (Trap/Futurista)</option>
                        <option value="BBN">Boom Baap Nations (Boom Bap)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Nombre del Beat</label>
                    <input type="text" id="nombre" placeholder="Ej: Aether Drift">
                </div>
                
                <div class="form-group">
                    <label>BPM</label>
                    <input type="number" id="bpm" placeholder="Ej: 125">
                </div>
                
                <div class="form-group">
                    <label>Mood / Vibe Principal</label>
                    <select id="mood">
                        <option value="cinematic">Cinematic (Orquestal, Épico)</option>
                        <option value="melodic">Dark Melodic (Triste, Piano, Emocional)</option>
                        <option value="rage">Rage / Aggressive (Energía, Distorsión)</option>
                        <option value="drill">UK Drill (Sliding 808s, Piano Oscuro)</option>
                        <option value="chill">Chill / Lo-Fi (Relajado, Jazz, Sample)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Características Específicas</label>
                    <textarea id="caracteristicas" placeholder="Ej: Futurista, calm, enigma, synths modernos, 808s profundos..."></textarea>
                </div>
                
                <button class="generate-btn" onclick="generarData()">🚀 Generar Todo</button>
            </div>

            <!-- RESULTADOS -->
            <div class="card">
                <h2>📊 Resultados <span class="badge">Listo para copiar</span></h2>
                
                <div class="output-section">
                    <h3>🎯 Canal & Playlist</h3>
                    <div class="output-box" id="out-meta"></div>
                </div>

                <div class="output-section">
                    <h3> Título YouTube</h3>
                    <button class="copy-btn" onclick="copiar('out-titulo')">📋 Copiar</button>
                    <div class="output-box" id="out-titulo"></div>
                </div>

                <div class="output-section">
                    <h3>📝 Descripción Completa</h3>
                    <button class="copy-btn" onclick="copiar('out-desc')">📋 Copiar</button>
                    <div class="output-box" id="out-desc"></div>
                </div>

                <div class="output-section">
                    <h3>🏷️ Tags (30 etiquetas)</h3>
                    <button class="copy-btn" onclick="copiar('out-tags')">📋 Copiar</button>
                    <div class="output-box" id="out-tags"></div>
                </div>

                <div class="output-section">
                    <h3> Prompt Cover Art (Nano Banana Pro)</h3>
                    <button class="copy-btn" onclick="copiar('out-prompt')">📋 Copiar</button>
                    <div class="output-box" id="out-prompt"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const moods = {
            cinematic: { 
                micro: "Cinematic Trap", 
                vibe: "Dark Cinematic", 
                playlist: "Cinematic Trap Beats",
                descVibe: "cinematic orchestral textures and epic dark production",
                tags: "cinematic trap type beat, cinematic beat, dark trap instrumental, epic trap beat, orchestral trap, travis scott type beat, yeat type beat, metro boomin type beat, cinematic instrumental 2026, dark cinematic beat, movie type beat, film score trap, dramatic trap beat, powerful trap instrumental, cinematic rap beat"
            },
            melodic: { 
                micro: "Dark Melodic", 
                vibe: "Emotional Melodic", 
                playlist: "Dark Melodic / Sad Trap",
                descVibe: "emotional piano progressions and melancholic atmospheric pads",
                tags: "dark melodic type beat, melodic trap beat, sad trap beat, emotional trap instrumental, juice wrld type beat, iann dior type beat, the kid laroi type beat, sad piano beat, dark atmospheric trap, melodic rap beat, heartbreak trap beat, chill melodic beat, sad type beat 2026, melancholic trap, emotional piano beat"
            },
            rage: { 
                micro: "Rage", 
                vibe: "High Energy Hardcore", 
                playlist: "Rage / Underground Beats",
                descVibe: "aggressive distorted synths and high-energy 808s",
                tags: "rage type beat, rage instrumental, hardcore trap beat, underground type beat, playboi carti type beat, opium type beat, ken carson type beat, destroy lonely type beat, aggressive trap beat, energy trap instrumental, rage beat 2026, punk trap beat, distorted trap beat, carti style beat, high energy rap beat"
            },
            drill: { 
                micro: "UK Drill", 
                vibe: "Dark Piano Drill", 
                playlist: "UK Drill / Brooklyn Drill",
                descVibe: "sliding 808s, rapid hi-hats and dark drill percussion",
                tags: "uk drill type beat, drill instrumental, brooklyn drill beat, dark piano drill, pop smoke type beat, central cee type beat, ny drill beat, sliding 808 drill, cold drill beat, dark drill instrumental, piano drill beat, hard drill beat, uk drill 2026, drill beat instrumental, grim drill type beat"
            },
            chill: { 
                micro: "Chill Boom Bap", 
                vibe: "Smooth Jazz Lo-Fi", 
                playlist: "Lofi Hip Hop Beats",
                descVibe: "smooth jazz samples, dusty drums and relaxed boom bap grooves",
                tags: "chill boom bap beat, lofi hip hop beat, jazz rap instrumental, nujabes type beat, j dilla type beat, smooth jazz beat, dusty drums beat, chillhop instrumental, relaxed boom bap, lofi beat 2026, jazz hop beat, study beat, chill instrumental, old school hip hop, boom bap 2026"
            }
        };

        function generarData() {
            const canal = document.getElementById('canal').value;
            const nombre = document.getElementById('nombre').value || "Beat Name";
            const bpm = document.getElementById('bpm').value || "120";
            const moodKey = document.getElementById('mood').value;
            const caracteristicas = document.getElementById('caracteristicas').value || "";
            const mood = moods[moodKey];

            const prodName = canal === 'BFYT' ? 'Beats BFYT' : 'Boom Baap Nations';
            const fourthwallLink = canal === 'BFYT' 
                ? 'https://beats-bfyt-shop.fourthwall.com'
                : 'https://boom-baap-nations-shop.fourthwall.com';

            // 1. Meta
            document.getElementById('out-meta').textContent = 
                `Canal: ${prodName}\nPlaylist: ${mood.playlist}\nMicro-nicho: ${mood.micro}`;

            // 2. Título (Regla de Oro: BFYT sin FREE, BBN con FREE + BPM siempre)
            let titulo = "";
            if (canal === 'BFYT') {
                titulo = `${mood.micro} Type Beat - "${nombre}" | ${mood.vibe} ${bpm} BPM`;
            } else {
                titulo = `[FREE] ${mood.micro} Type Beat - "${nombre}" | ${mood.vibe} ${bpm} BPM`;
            }
            document.getElementById('out-titulo').textContent = titulo;

            // 3. Descripción
            const desc = `${nombre} is a ${mood.micro.toLowerCase()} beat with ${mood.descVibe}${caracteristicas ? ' featuring ' + caracteristicas : ''}. 

🛒 Purchase a license & download instantly: ${fourthwallLink}

💿 License Tiers:
• Basic: $14.99 (MP3, Non-profit use)
• Standard: $29.99 (MP3 + WAV, Commercial use)
• Premium: $49.99 (MP3 + WAV + STEMS, Full commercial use)

⚠️ FREE for non-profit use only (must credit "Prod. by ${prodName}" in the title). Purchase a license for commercial use, Spotify, Apple Music, or monetization.

📱 Follow the journey:
Instagram: @beatsfreeyoutube_
TikTok: @beatsfreeyoutube_

#typebeat #${mood.micro.replace(' ', '')} #${prodName.replace(' ', '')} #${nombre.replace(' ', '')}`;
            document.getElementById('out-desc').textContent = desc;

            // 4. Tags
            const tags = `${mood.tags}, ${nombre.toLowerCase().replace(' ', '')} beat, ${bpm} bpm ${mood.micro.toLowerCase()}, ${prodName.toLowerCase().replace(' ', '')} beats, premium trap production, ${mood.micro.toLowerCase()} instrumental, dark ${mood.micro.toLowerCase()} beat, underground ${mood.micro.toLowerCase()}, melodic ${mood.micro.toLowerCase()}, atmospheric trap beat, ${mood.micro.toLowerCase()} beat for rap, ${mood.micro.toLowerCase()} instrumental 2026, trap beat with ${mood.vibe.toLowerCase()}, ${prodName.toLowerCase().replace(' ', '')} original, sophisticated ${mood.micro.toLowerCase()} beat, luxury ${mood.micro.toLowerCase()} instrumental, ${mood.micro.toLowerCase()} beat ${bpm} bpm, ${mood.vibe.toLowerCase()} trap instrumental, ${mood.micro.toLowerCase()} type beat 2026, premium type beat, ${prodName.toLowerCase().replace(' ', '')} production, ${mood.micro.toLowerCase()} beat free, ${mood.vibe.toLowerCase()} type beat, ${mood.micro.toLowerCase()} instrumental free, trap instrumental ${bpm} bpm, ${mood.micro.toLowerCase()} beat download`;
            document.getElementById('out-tags').textContent = tags;

            // 5. Prompt Cover Art (Fórmula ganadora con mano en cadena)
            const prompt = `Raw photo, shot on 35mm film camera, breathtakingly beautiful curvy New York Latina woman with voluptuous hourglass figure, fit and thick, transmitting pure trap flow, boss energy, and street luxury elegance. Striking facial features, fierce confident gaze, glamorous makeup with sharp eyeliner and glossy lips. She sits in luxury car at night wearing a sleek dark metallic silk outfit that hugs her curves elegantly. Heavy diamond Cuban link chain with "${nombre.toUpperCase()}" text pendant clearly visible between her fingers as her hand rests on the chain, long acrylic nails with chrome finish, iced-out diamond rings on her fingers, iced-out rose gold watch catching soft neon light. Moody nocturnal atmosphere with subtle holographic mist, dark luxury car interior with ambient LED strips. Cinematic lighting highlighting her hand on the chain, her curves, facial contours, and jewelry sparkle. Professional trap music video aesthetic, sensual luxurious vibe, high contrast, shallow depth of field, NO TEXT OVERLAY, NO LETTERS except chain pendant --ar 1:1 --style raw_photo --quality 2`;
            document.getElementById('out-prompt').textContent = prompt;
        }

        function copiar(id) {
            const texto = document.getElementById(id).textContent;
            navigator.clipboard.writeText(texto).then(() => {
                const btn = event.target;
                const original = btn.textContent;
                btn.textContent = '✅ ¡Copiado!';
                btn.style.background = '#00f2ff';
                btn.style.color = '#0a0a0f';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '#2a2a35';
                    btn.style.color = 'white';
                }, 2000);
            }).catch(err => {
                alert('Error al copiar: ' + err);
            });
        }
    </script>
</body>
</html>
