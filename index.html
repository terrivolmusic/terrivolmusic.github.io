/* Mismas variables que servicios.html */
:root {
  --accent: #7b5cfa; 
  --accent2: #00e5ff; 
  --bg: #0a0a0f; 
  --surface: rgba(20,20,30,0.6);
  --border: rgba(255,255,255,0.08); 
  --text: #f8fafc; 
  --muted: #94a3b8;
}

/* Hero estilo servicios */
.hero-pro { 
  min-height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  position: relative; 
  padding: 8rem 2rem 4rem; 
  overflow: hidden; 
  text-align: center; 
}

.hero-bg-pro { 
  position: absolute; 
  inset: 0; 
  z-index: 0; 
  background: radial-gradient(ellipse at 30% 20%, rgba(123,92,250,.25), transparent 60%), 
              radial-gradient(ellipse at 80% 80%, rgba(0,229,255,.15), transparent 60%); 
}

.hero-overlay-pro { 
  position: absolute; 
  inset: 0; 
  background: linear-gradient(180deg, rgba(10,10,15,0.3) 0%, var(--bg) 100%); 
  z-index: 1; 
}

.hero-content-pro { 
  position: relative; 
  z-index: 2; 
  max-width: 800px; 
}

.hero-badge { 
  display: inline-block; 
  background: rgba(0,229,255,.1); 
  border: 1px solid rgba(0,229,255,.3); 
  color: var(--accent2); 
  padding: 0.5rem 1.2rem; 
  border-radius: 50px; 
  font-size: 0.75rem; 
  font-weight: 700; 
  margin-bottom: 1.5rem; 
  letter-spacing: 1px; 
  text-transform: uppercase; 
}

.hero-title { 
  font-size: clamp(2.5rem, 6vw, 4.5rem); 
  font-weight: 900; 
  line-height: 1.1; 
  margin-bottom: 1rem; 
  color: #fff;
}

.hero-title .gradient-text { 
  background: linear-gradient(135deg, #7b5cfa, #00e5ff); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
  background-clip: text; 
}

.hero-sub { 
  font-size: 1.15rem; 
  color: var(--muted); 
  margin-bottom: 2.5rem; 
  max-width: 600px; 
  margin-left: auto; 
  margin-right: auto; 
}

/* Botones estilo servicios */
.btn-primary { 
  background: linear-gradient(135deg, #7b5cfa, #00e5ff); 
  color: #fff; 
  padding: 1rem 2.5rem; 
  border-radius: 8px; 
  font-weight: 700; 
  text-decoration: none; 
  font-size: 1rem; 
  transition: all 0.3s; 
  display: inline-flex; 
  align-items: center; 
  gap: 0.5rem; 
  border: none;
}

.btn-primary:hover { 
  transform: translateY(-2px); 
  box-shadow: 0 10px 30px rgba(0,229,255,0.3); 
}

.btn-secondary {

  font-size: 1rem;

  display: inline-flex; 
  align-items: center; 
  gap: 0.5rem; 
}
