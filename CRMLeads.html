<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrivol Music | AI Batch CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            color: #f8fafc; 
            font-family: 'Inter', system-ui, sans-serif; 
            min-height: 100vh;
        }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: rgba(51, 65, 85, 0.5); border: 1px solid rgba(99, 102, 241, 0.2); transition: 0.3s; }
        .glass-card:hover { transform: translateY(-2px); border-color: rgba(99, 102, 241, 0.5); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; font-weight: 600; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; font-weight: 600; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; }
        .upload-zone { border: 3px dashed rgba(99, 102, 241, 0.5); border-radius: 16px; padding: 60px 40px; text-align: center; cursor: pointer; background: rgba(99, 102, 241, 0.05); transition: 0.3s; }
        .upload-zone:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.15); }
        input { background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(99, 102, 241, 0.3); color: white; padding: 12px; border-radius: 10px; width: 100%; }
        input:focus { outline: none; border-color: #6366f1; }
        .profile-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: 0.3s; }
        .profile-card:hover { border-color: rgba(99, 102, 241, 0.5); }
        .profile-card.processing { border-color: #f59e0b; animation: pulse 1.5s infinite; }
        .profile-card.completed { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .copy-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; padding: 12px; margin-top: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-processing { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-completed { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-error { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <div class="mb-8">
            <h1 class="text-5xl font-black mb-2 gradient-text">🎵 Terrivol Music</h1>
            <p class="text-slate-400">AI Batch Processing - Generación Masiva de Copys</p>
        </div>

        <!-- API CONFIG -->
        <div class="glass-card p-6 rounded-2xl mb-6">
            <div class="flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-sm font-medium mb-2">Google Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="AIza...">
                </div>
                <button onclick="saveApiKey()" class="btn-primary">Guardar Key</button>
            </div>
            <p class="text-xs text-slate-400 mt-2">Obtén tu key en: <a href="https://makersuite.google.com/app/apikey" target="_blank" class="text-indigo-400">Google AI Studio</a></p>
        </div>

        <!-- UPLOAD ZONE -->
        <div class="glass-card p-6 rounded-2xl mb-6">
            <h2 class="text-2xl font-bold mb-4">📸 Sube los Pantallazos (Hasta 30)</h2>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="upload-cloud" class="w-16 h-16 mx-auto mb-4 text-indigo-400"></i>
                <p class="text-xl font-semibold mb-2">Arrastra las imágenes aquí</p>
                <p class="text-slate-400">o haz click para seleccionar archivos</p>
                <p class="text-sm text-slate-500 mt-2">Formatos: JPG, PNG, WEBP • Máximo 30 imágenes</p>
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
            </div>
            
            <div id="batchControls" class="hidden mt-6 flex gap-4">
                <button onclick="processAll()" class="btn-success flex-1 py-4 text-lg">
                    <i data-lucide="zap" class="w-5 h-5 inline mr-2"></i>
                    Procesar Todos los Perfiles (<span id="pendingCount">0</span>)
                </button>
                <button onclick="exportAllCopies()" class="btn-primary flex-1 py-4 text-lg">
                    <i data-lucide="download" class="w-5 h-5 inline mr-2"></i>
                    Exportar Todos los Copys
                </button>
                <button onclick="clearAll()" class="px-6 py-4 bg-red-500/20 text-red-400 rounded-xl border border-red-500/30 hover:bg-red-500/30">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- PROGRESS -->
        <div id="progressSection" class="hidden glass-card p-6 rounded-2xl mb-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Progreso de Procesamiento</h3>
                <span class="text-2xl font-bold gradient-text"><span id="processedCount">0</span>/<span id="totalCount">0</span></span>
            </div>
            <div class="w-full bg-slate-800 rounded-full h-4 mb-2">
                <div id="progressBar" class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-sm text-slate-400" id="progressText">Iniciando...</p>
        </div>

        <!-- PROFILES LIST -->
        <div id="profilesList" class="space-y-4">
            <!-- Los perfiles se agregarán aquí dinámicamente -->
        </div>
    </div>

    <script>
        let profiles = [];
        let apiKey = localStorage.getItem('terrivol_gemini_key') || '';
        let isProcessing = false;

        // Upload handlers
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.borderColor = '#6366f1'; });
        uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = 'rgba(99, 102, 241, 0.5)'; });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.style.borderColor = 'rgba(99, 102, 241, 0.5)';
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            
            if (profiles.length + imageFiles.length > 30) {
                alert('Máximo 30 imágenes permitidas');
                return;
            }

            imageFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    profiles.push({
                        id: Date.now() + index,
                        file: file,
                        image: e.target.result,
                        status: 'pending',
                        copy: null,
                        data: null
                    });
                    renderProfiles();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderProfiles() {
            const container = document.getElementById('profilesList');
            const batchControls = document.getElementById('batchControls');
            
            if (profiles.length === 0) {
                container.innerHTML = '';
                batchControls.classList.add('hidden');
                return;
            }

            batchControls.classList.remove('hidden');
            document.getElementById('pendingCount').textContent = profiles.filter(p => p.status === 'pending').length;

            container.innerHTML = profiles.map((profile, index) => `
                <div class="profile-card ${profile.status}" id="profile-${profile.id}">
                    <div class="flex gap-4">
                        <img src="${profile.image}" class="w-32 h-32 object-cover rounded-lg border border-slate-700">
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="font-bold text-lg">Perfil #${index + 1}</h3>
                                    <p class="text-sm text-slate-400">${profile.file.name}</p>
                                </div>
                                <span class="badge badge-${profile.status}">
                                    ${profile.status === 'pending' ? '⏳ Pendiente' : 
                                      profile.status === 'processing' ? '⚡ Procesando' : 
                                      profile.status === 'completed' ? '✅ Completado' : '❌ Error'}
                                </span>
                            </div>
                            
                            ${profile.data ? `
                                <div class="grid grid-cols-3 gap-2 mb-3 text-sm">
                                    <div><span class="text-slate-400">Usuario:</span> <strong>${profile.data.username || '-'}</strong></div>
                                    <div><span class="text-slate-400">Followers:</span> <strong>${profile.data.followers || '-'}</strong></div>
                                    <div><span class="text-slate-400">Tipo:</span> <strong>${profile.data.tipo || '-'}</strong></div>
                                </div>
                            ` : ''}
                            
                            ${profile.copy ? `
                                <div class="copy-box">${profile.copy}</div>
                                <div class="flex gap-2 mt-3">
                                    <button onclick="copySingle(${profile.id})" class="px-4 py-2 bg-indigo-500/20 text-indigo-400 rounded-lg hover:bg-indigo-500/30 text-sm">
                                        📋 Copiar
                                    </button>
                                    <button onclick="saveToCRM(${profile.id})" class="px-4 py-2 bg-emerald-500/20 text-emerald-400 rounded-lg hover:bg-emerald-500/30 text-sm">
                                        💾 Guardar en CRM
                                    </button>
                                </div>
                            ` : ''}
                            
                            ${profile.status === 'error' ? `<p class="text-red-400 text-sm mt-2">${profile.error || 'Error al procesar'}</p>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        async function processAll() {
            if (isProcessing) return;
            isProcessing = true;
            
            const pendingProfiles = profiles.filter(p => p.status === 'pending');
            if (pendingProfiles.length === 0) {
                alert('No hay perfiles pendientes');
                isProcessing = false;
                return;
            }

            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('totalCount').textContent = pendingProfiles.length;

            let processed = 0;
            for (const profile of pendingProfiles) {
                await processProfile(profile);
                processed++;
                updateProgress(processed, pendingProfiles.length);
                await new Promise(r => setTimeout(r, 1000)); // Esperar 1s entre cada uno
            }

            isProcessing = false;
            renderProfiles();
        }

        async function processProfile(profile) {
            profile.status = 'processing';
            renderProfiles();

            try {
                let mimeType = 'image/jpeg';
                if (profile.image.includes('image/png')) mimeType = 'image/png';
                const base64Data = profile.image.split(',')[1];

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {
                                    text: `Analiza este perfil de Instagram de un artista musical. Extrae:
1. @usuario exacto
2. Número de seguidores
3. Biografía
4. Tipo de artista (cantante, productor, banda)
5. Género musical
6. Vibe/energía visual (colores, estética)

Genera un copy profesional para Terrivol Music ENT ofreciendo auditoría gratuita de publishing y derechos. 
Máximo 100 palabras. Tono cercano pero profesional. Incluye emojis.

Responde en JSON:
{
  "username": "@usuario",
  "followers": "12345",
  "bio": "texto",
  "tipo": "cantante",
  "genero": "urbano",
  "vibe": "descripción",
  "copy": "copy generado"
}`
                                },
                                { inline_data: { mime_type: mimeType, data: base64Data } }
                            ]
                        }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
                    })
                });

                if (!response.ok) throw new Error('Error en API');

                const result = await response.json();
                const text = result.candidates[0].content.parts[0].text;
                
                let data;
                try {
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    data = jsonMatch ? JSON.parse(jsonMatch[0]) : null;
                } catch (e) { data = null; }

                if (!data) {
                    data = {
                        username: text.match(/@([a-zA-Z0-9_.]+)/)?.[0] || '@artista',
                        followers: '0',
                        bio: text.substring(0, 100),
                        tipo: 'artista',
                        genero: 'no especificado',
                        vibe: 'vibra artística',
                        copy: text.replace(/```json|```/g, '').trim()
                    };
                }

                profile.data = data;
                profile.copy = data.copy;
                profile.status = 'completed';

            } catch (error) {
                profile.status = 'error';
                profile.error = error.message;
            }

            renderProfiles();
        }

        function updateProgress(current, total) {
            const percent = (current / total) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('processedCount').textContent = current;
            document.getElementById('progressText').textContent = `Procesando perfil ${current} de ${total}...`;
        }

        function copySingle(id) {
            const profile = profiles.find(p => p.id === id);
            if (profile && profile.copy) {
                navigator.clipboard.writeText(profile.copy);
                alert('✅ Copy copiado');
            }
        }

        function exportAllCopies() {
            const completedProfiles = profiles.filter(p => p.status === 'completed');
            if (completedProfiles.length === 0) {
                alert('No hay copys para exportar');
                return;
            }

            let text = 'TERRIVOL MUSIC - COPYS GENERADOS\n';
            text += '==============================\n\n';
            
            completedProfiles.forEach((profile, index) => {
                text += `PERFIL #${index + 1}\n`;
                text += `Usuario: ${profile.data.username}\n`;
                text += `Followers: ${profile.data.followers}\n`;
                text += `Tipo: ${profile.data.tipo}\n`;
                text += `Género: ${profile.data.genero}\n`;
                text += `\nCOPY:\n${profile.copy}\n`;
                text += '\n' + '='.repeat(50) + '\n\n';
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `terrivol_copys_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
        }

        function saveToCRM(id) {
            const profile = profiles.find(p => p.id === id);
            if (!profile || !profile.data) return;

            let leads = JSON.parse(localStorage.getItem('terrivol_leads') || '[]');
            leads.push({
                ig: profile.data.username,
                nombre: profile.data.username.replace('@', ''),
                followers: profile.data.followers,
                pais: '-',
                genero: profile.data.genero,
                notas: `Vibe: ${profile.data.vibe} | Bio: ${profile.data.bio}`,
                copy: profile.copy,
                estado: 'nuevo',
                fecha: new Date().toISOString()
            });
            localStorage.setItem('terrivol_leads', JSON.stringify(leads));
            alert('✅ Guardado en CRM');
        }

        function clearAll() {
            if (confirm('¿Eliminar todos los perfiles?')) {
                profiles = [];
                renderProfiles();
                document.getElementById('progressSection').classList.add('hidden');
            }
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key && key.startsWith('AIza')) {
                apiKey = key;
                localStorage.setItem('terrivol_gemini_key', key);
                alert('✅ API Key guardada');
            } else {
                alert('❌ Key inválida');
            }
        }

        if (apiKey) document.getElementById('apiKey').value = apiKey;
        lucide.createIcons();
    </script>
</body>
</html>
