<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios | Terrivol Music</title>
<link rel="stylesheet" href="style.css">
<style>
.services-hero{min-height:80vh;display:flex;align-items:center;position:relative;padding:8rem 0 4rem;overflow:hidden}
.services-hero-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,rgba(123,92,250,.25),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,229,255,.15),transparent 60%)}
.services-hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(3,3,10,.9) 0%,rgba(3,3,10,.7) 50%,rgba(123,92,250,.15) 100%)}
.services-hero-content{position:relative;z-index:1;text-align:center;max-width:900px;margin:0 auto}
.services{padding:6rem 0;position:relative}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2rem;margin:4rem 0}
.service-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2.5rem;transition:all .4s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;backdrop-filter:blur(10px);text-decoration:none;color:var(--text);display:block}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));opacity:0;transition:opacity .4s}
.service-card::after{content:'';position:absolute;inset:0;background:radial-gradient(600px circle at var(--mouse-x) var(--mouse-y),rgba(123,92,250,.15),transparent 40%);opacity:0;transition:opacity .4s;pointer-events:none}
.service-card:hover{transform:translateY(-8px);border-color:var(--accent);box-shadow:0 20px 60px rgba(123,92,250,.3),0 0 0 1px rgba(123,92,250,.5)}
.service-card:hover::before{opacity:1}
.service-card:hover::after{opacity:1}
.service-icon{width:56px;height:56px;margin-bottom:1.5rem;color:var(--accent);transition:transform .3s}
.service-card:hover .service-icon{transform:scale(1.1) rotate(5deg)}
.service-title{font-size:1.5rem;font-weight:700;margin-bottom:1rem;line-height:1.2}
.service-desc{color:var(--muted);line-height:1.7;margin-bottom:2rem;font-size:.95rem}
.service-link{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:all .3s;padding:.5rem 0}
.service-link:hover{color:var(--accent2);gap:1rem}
@media(max-width:968px){.services-hero{padding:6rem 0 2rem}.services-grid{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}}
@media(max-width:768px){.services-hero{padding:4rem 0 2rem}.services{padding:3rem 0}.services-grid{grid-template-columns:1fr;gap:1.5rem}.service-card{padding:2rem}.service-title{font-size:1.3rem}}
</style>
</head>
<body>
